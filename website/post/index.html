<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open In Empire Connect</title>
  <meta name="theme-color" content="#07110f">
  <meta name="description" content="Open this Empire Connect post in the app.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="../styles.css">
</head>
<body class="page-inner">
  <div class="site-shell">
    <main class="inner-main share-main">
      <section class="share-route reveal">
        <div class="liquid-card share-card">
          <span class="brand-mark brand-mark-icon share-brand">
            <img src="../assets/app-icon.png" alt="Empire Connect app icon">
          </span>
          <p class="eyebrow">Empire Connect</p>
          <h1>Open this post in the app.</h1>
          <p class="share-copy">If Empire Connect is installed, this link should open directly to the shared post. If not, you can join the beta below.</p>
          <div class="share-actions">
            <a class="button button-primary" data-open-app href="#">Open In App</a>
            <a class="button button-secondary" href="https://testflight.apple.com/join/3ggNHyBK" target="_blank" rel="noreferrer">Download Beta</a>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="../share-route.js"></script>
</body>
</html>
